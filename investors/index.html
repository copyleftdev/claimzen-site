const b642buf = b => Uint8Array.from(atob(b), c=>c.charCodeAt(0));
async function deriveKey(pass){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:SALT,iterations:ITER,hash:"SHA-256"}, km, {name:"AES-GCM",length:256}, false, ["decrypt"]);
}
async function dec(key, buf){
  const iv = buf.slice(0,12), data = buf.slice(12);
  return new Uint8Array(await crypto.subtle.decrypt({name:"AES-GCM",iv}, key, data));
}
const gform=document.getElementById("gform"), gpass=document.getElementById("gpass"), gerr=document.getElementById("gerr");
gform.addEventListener("submit", async e=>{
  e.preventDefault(); gerr.textContent="Unlocking…";
  try{
    const key = await deriveKey(gpass.value);
    const html = new TextDecoder().decode(await dec(key, b642buf(CONTENT_CIPHER)));
    const content = document.getElementById("content");
    content.innerHTML = html;
    document.getElementById("gate").style.display="none";
    content.classList.add("on"); window.scrollTo(0,0);
    for(const v of content.querySelectorAll("video[data-enc]")){
      const res = await fetch(v.dataset.enc); const buf = new Uint8Array(await res.arrayBuffer());
      const plain = await dec(key, buf);
      v.src = URL.createObjectURL(new Blob([plain], {type:"video/mp4"}));
    }
  }catch(err){ gerr.textContent="Incorrect passphrase."; }
